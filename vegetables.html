<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vegetables Products List</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f7f9fa;
            color: #333;
            padding: 40px 20px;
        }
        h1 {
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 40px;
            color: #1a1a1a;
        }
        /* Grid Container */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr); /* Ek line me 5 cards */
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        /* Product Card Design */
        .product-card {
            background: #ffffff;
            border: 1px solid #eaeaea;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }
        /* Image Wrapper */
        .image-container {
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }
        .image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        /* Product Details */
        .product-name {
            font-size: 15px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 10px;
            min-height: 40px; /* Name align rakhne ke liye */
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .product-price {
            font-size: 16px;
            font-weight: bold;
            color: #e74c3c; /* Red color jaisa screenshot me hai */
        }

        /* Responsive Settings for Mobile & Tablets */
        @media (max-width: 1024px) {
            .products-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 768px) {
            .products-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 480px) {
            .products-grid { grid-template-columns: repeat(1, 1fr); }
        }
    </style>
</head>
<body>

    <h1>Vegetables Products List</h1>

    <div class="products-grid">
        
        <!-- Item 1 -->
        <div class="product-card">
            <div class="image-container">
                <!-- 'tomato.png' ki jagah apni image ka naam ya link dalein -->
                <img src="tomato.png" alt="Tomato"> 
            </div>
            <div class="product-name">Fresh Tomato (1 KG)</div>
            <div class="product-price">40/-</div>
        </div>

        <!-- Item 2 -->
        <div class="product-card">
            <div class="image-container">
                <img src="potato.png" alt="Potato">
            </div>
            <div class="product-name">Allo / Potato (1 KG)</div>
            <div class="product-price">30/-</div>
        </div>

        <!-- Item 3 -->
        <div class="product-card">
            <div class="image-container">
                <img src="onion.png" alt="Onion">
            </div>
            <div class="product-name">Pyaz / Onion (1 KG)</div>
            <div class="product-price">50/-</div>
        </div>

        <!-- Item 4 -->
        <div class="product-card">
            <div class="image-container">
                <img src="capsicum.png" alt="Capsicum">
            </div>
            <div class="product-name">Shimla Mirch (500 GM)</div>
            <div class="product-price">35/-</div>
        </div>

        <!-- Item 5 -->
        <div class="product-card">
            <div class="image-container">
                <img src="cucumber.png" alt="Cucumber">
            </div>
            <div class="product-name">Kheera / Cucumber (1 KG)</div>
            <div class="product-price">40/-</div>
        </div>

        <!-- Item 6 -->
        <div class="product-card">
            <div class="image-container">
                <img src="peas.png" alt="Peas">
            </div>
            <div class="product-name">Matar / Green Peas (1 KG)</div>
            <div class="product-price">80/-</div>
        </div>

        <!-- Item 7 -->
        <div class="product-card">
            <div class="image-container">
                <img src="pumpkin.png" alt="Pumpkin">
            </div>
            <div class="product-name">Kaddu / Pumpkin (1 KG)</div>
            <div class="product-price">25/-</div>
        </div>

    </div>

</body>
</html>
