<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabji Mandi List</title>
    <style>
        :root {
            --primary-color: #2e7d32;
            --bg-color: #f1f8e9;
            --card-bg: #ffffff;
            --text-color: #1b5e20;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        h1 {
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 3px solid var(--primary-color);
            padding-bottom: 10px;
        }
        .veg-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .veg-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 8px;
            border-left: 5px solid var(--primary-color);
        }
        .veg-info {
            flex: 1;
        }
        .veg-name {
            font-size: 18px;
            font-weight: bold;
            color: var(--text-color);
        }
        .veg-price {
            font-size: 14px;
            color: #666;
        }
        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 18px;
            cursor: pointer;
        }
        .btn:hover {
            background-color: #1b5e20;
        }
        .qty-input {
            width: 40px;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 3px;
        }
        .total-section {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 2px dashed #ccc;
            text-align: right;
            font-size: 20px;
            font-weight: bold;
            color: var(--primary-color);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🥦 Veggie Cart (7 Items)</h1>
    
    <div class="veg-list">
        <!-- Item 1 -->
        <div class="veg-item" data-price="40">
            <div class="veg-info">
                <div class="veg-name">🍅 Tamatar (Tomato)</div>
                <div class="veg-price">₹40 / kg</div>
            </div>
            <div class="quantity-controls">
                <button class="btn" onclick="updateQty(this, -1)">-</button>
                <input type="text" class="qty-input" value="0" readonly>
                <button class="btn" onclick="updateQty(this, 1)">+</button>
            </div>
        </div>

        <!-- Item 2 -->
        <div class="veg-item" data-price="30">
            <div class="veg-info">
                <div class="veg-name">🥔 Aloo (Potato)</div>
                <div class="veg-price">₹30 / kg</div>
            </div>
            <div class="quantity-controls">
                <button class="btn" onclick="updateQty(this, -1)">-</button>
                <input type="text" class="qty-input" value="0" readonly>
                <button class="btn" onclick="updateQty(this, 1)">+</button>
            </div>
        </div>

        <!-- Item 3 -->
        <div class="veg-item" data-price="50">
            <div class="veg-info">
                <div class="veg-name">🧅 Pyaz (Onion)</div>
                <div class="veg-price">₹50 / kg</div>
            </div>
            <div class="quantity-controls">
                <button class="btn" onclick="updateQty(this, -1)">-</button>
                <input type="text" class="qty-input" value="0" readonly>
                <button class="btn" onclick="updateQty(this, 1)">+</button>
            </div>
        </div>

        <!-- Item 4 -->
        <div class="veg-item" data-price="60">
            <div class="veg-info">
                <div class="veg-name">🫑 Shimla Mirch (Capsicum)</div>
                <div class="veg-price">₹60 / kg</div>
            </div>
            <div class="quantity-controls">
                <button class="btn" onclick="updateQty(this, -1)">-</button>
                <input type="text" class="qty-input" value="0" readonly>
                <button class="btn" onclick="updateQty(this, 1)">+</button>
            </div>
        </div>

        <!-- Item 5 -->
        <div class="veg-item" data-price="40">
            <div class="veg-info">
                <div class="veg-name">🥒 Kheera (Cucumber)</div>
                <div class="veg-price">₹40 / kg</div>
            </div>
            <div class="quantity-controls">
                <button class="btn" onclick="updateQty(this, -1)">-</button>
                <input type="text" class="qty-input" value="0" readonly>
                <button class="btn" onclick="updateQty(this, 1)">+</button>
            </div>
        </div>

        <!-- Item 6 -->
        <div class="veg-item" data-price="80">
            <div class="veg-info">
                <div class="veg-name">🫛 Matar (Peas)</div>
                <div class="veg-price">₹80 / kg</div>
            </div>
            <div class="quantity-controls">
                <button class="btn" onclick="updateQty(this, -1)">-</button>
                <input type="text" class="qty-input" value="0" readonly>
                <button class="btn" onclick="updateQty(this, 1)">+</button>
            </div>
        </div>

        <!-- Item 7 -->
        <div class="veg-item" data-price="35">
            <div class="veg-info">
                <div class="veg-name">🎃 Kaddu (Pumpkin)</div>
                <div class="veg-price">₹35 / kg</div>
            </div>
            <div class="quantity-controls">
                <button class="btn" onclick="updateQty(this, -1)">-</button>
                <input type="text" class="qty-input" value="0" readonly>
                <button class="btn" onclick="updateQty(this, 1)">+</button>
            </div>
        </div>
    </div>

    <div class="total-section">
        Total Bill: ₹<span id="totalBill">0</span>
    </div>
</div>

<script>
    function updateQty(button, change) {
        const input = button.parentElement.querySelector('.qty-input');
        let currentQty = parseInt(input.value);
        
        currentQty += change;
        if (currentQty < 0) currentQty = 0; // Quantity 0 se kam nahi ho sakti
        
        input.value = currentQty;
        calculateTotal();
    }

    function calculateTotal() {
        let total = 0;
        const items = document.querySelectorAll('.veg-item');
        
        items.forEach(item => {
            const price = parseInt(item.getAttribute('data-price'));
            const qty = parseInt(item.querySelector('.qty-input').value);
            total += price * qty;
        });
        
        document.getElementById('totalBill').innerText = total;
    }
</script>

</body>
</html>
