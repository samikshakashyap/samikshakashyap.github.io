<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All-in-One Grocery Store</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f6fa;
            padding-bottom: 50px;
        }

        /* Header & Cart Counter */
        header {
            background-color: #2c3e50;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .cart-box {
            background-color: #e74c3c;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.95rem;
        }

        /* Category Tabs */
        .tabs-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 25px 0;
        }

        .tab-btn {
            padding: 10px 20px;
            border: none;
            background-color: #fff;
            color: #333;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: all 0.3s;
        }

        .tab-btn.active {
            background-color: #27ae60;
            color: white;
        }

        /* Grid System */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Item Card */
        .item-card {
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            overflow: hidden;
            text-align: center;
            padding: 15px;
            transition: transform 0.2s;
        }

        .item-card:hover {
            transform: translateY(-5px);
        }

        .item-card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 8px;
            background-color: #f9f9f9;
        }

        .item-name {
            font-size: 1.05rem;
            font-weight: 600;
            color: #333;
            margin: 10px 0 5px 0;
        }

        .item-category {
            font-size: 0.8rem;
            color: #7f8c8d;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        /* Add to Cart Button */
        .add-to-cart-btn {
            width: 100%;
            padding: 10px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .add-to-cart-btn:hover {
            background-color: #27ae60;
        }

        .add-to-cart-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <!-- Header Section -->
    <header>
        <h2>Apni Grocery Dukaan</h2>
        <div class="cart-box">🛒 Cart: <span id="cart-count">0</span></div>
    </header>

    <!-- Navigation Tabs -->
    <div class="tabs-container">
        <button class="tab-btn active" onclick="filterItems('ration')">Ration</button>
        <button class="tab-btn" onclick="filterItems('personal')">Personal Care</button>
        <button class="tab-btn" onclick="filterItems('snacks')">Snacks & Drinks</button>
    </div>

    <!-- Items Grid Area -->
    <div class="items-grid" id="products-container">
        <!-- JavaScript will load items here dynamically -->
    </div>

    <!-- JavaScript code to handle Cart and Data -->
    <script>
        // All products data array
        const products = [
            // Ration Items
            { id: 1, name: "Basmati Rice (Chawal)", category: "Grains", type: "ration", img: "https://unsplash.com" },
            { id: 2, name: "Wheat Flour (Atta)", category: "Grains", type: "ration", img: "https://unsplash.com" },
            { id: 3, name: "Toor Dal (Arhar)", category: "Pulses", type: "ration", img: "https://unsplash.com" },
            { id: 4, name: "Mustard Oil (Sarso Tel)", category: "Oils & Ghee", type: "ration", img: "https://unsplash.com" },
            
            // Personal Care Items
            { id: 5, name: "Bathing Soap (Sabun)", category: "Body Care", type: "personal", img: "https://unsplash.com" },
            { id: 6, name: "Hair Shampoo", category: "Hair Care", type: "personal", img: "https://unsplash.com" },
            { id: 7, name: "Toothpaste", category: "Oral Care", type: "personal", img: "https://unsplash.com" },
            
            // Snacks & Drinks Items
            { id: 8, name: "Premium Biscuits", category: "Biscuits & Chips", type: "snacks", img: "https://unsplash.com" },
            { id: 9, name: "Potato Chips", category: "Biscuits & Chips", type: "snacks", img: "https://unsplash.com" },
            { id: 10, name: "Soft Drink (Cola)", category: "Cold Drinks & Juices", type: "snacks", img: "https://unsplash.com" }
        ];

        let cartCount = 0;

        // Function to display items based on selected tab
        function filterItems(type) {
            // Update Active Class on Buttons
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            const container = document.getElementById('products-container');
            container.innerHTML = ""; // Clear existing items

            // Filter items by type
            const filtered = products.filter(item => item.type === type);

            // Generate HTML for cards
            filtered.forEach(item => {
                const card = `
                    <div class="item-card">
                        <img src="${item.img}" alt="${item.name}">
                        <div class="item-name">${item.name}</div>
                        <div class="item-category">${item.category}</div>
                        <button class="add-to-cart-btn" onclick="addToCart()">Add to Cart</button>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        // Function to handle Add to Cart click
        function addToCart() {
            cartCount++;
            document.getElementById('cart-count').innerText = cartCount;
            alert("Item successfully cart mein add ho gaya!");
        }

        // Load Ration items by default on page open
        window.onload = function() {
            // Passing a dummy event target for default load
            const firstTab = document.querySelector('.tab-btn');
            filterItems('ration');
        };
    </script>
</body>
</html>
