<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ration Items List</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f5f5;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }

        /* Responsive Grid Setup */
        .grocery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Item Card Style */
        .item-card {
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow: hidden;
            text-align: center;
            transition: transform 0.2s;
            padding: 15px;
        }

        .item-card:hover {
            transform: translateY(-5px);
        }

        /* Image Styling */
        .item-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 6px;
            background-color: #f9f9f9;
        }

        /* Text Styling */
        .item-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
            margin: 12px 0 6px 0;
        }

        .item-category {
            font-size: 0.85rem;
            color: #27ae60;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>
