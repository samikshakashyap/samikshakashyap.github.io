<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dairy Products Items</title>
    <style>
        /* Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f8f9fa;
            color: #333;
            padding: 20px;
        }

        /* Title Style */
        .page-title {
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            color: #222;
            margin: 20px 0 40px 0;
        }

        /* Responsive Grid Layout - Bilkul aapke page jaisa */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Product Card Style */
        .product-card {
            background: white;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }

        /* Image Box Fixed Size */
        .image-container {
            width: 100%;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* Text Styles */
        .product-name {
            font-size: 16px;
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
        }

        .product-price {
            font-size: 14px;
            font-weight: bold;
            color: #ff5722; /* Orange color price tag */
        }
        
        /* Back Button Style */
        .back-link {
            display: block;
            text-align: center;
            margin-bottom: 25px;
            text-decoration: none;
            color: #2874f0;
            font-weight: bold;
        }
    </style>
</head>
